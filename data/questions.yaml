# Token-experiment dataset (FR-8.1, T263-T266) — FROZEN at commit time.
# Built from the validated i00 graph of pallets/werkzeug, every reference
# spot-checked against raw source at the pinned SHA (answer-key bias
# mitigation, PLAN §4.1). Tiers: 3 locate / 4 path / 3 impact.

version: "1.00"
target_repo_sha: "1b00618e787f40dfb21eba29caf8f8be7c8e1d93"

questions:
  - id: Q-01
    tier: locate
    question: "Where is the URL routing Map (and the bound MapAdapter it produces) implemented?"
    reference_answer: >
      src/werkzeug/routing/map.py — class Map (~line 40) holds the ordered
      Rule set and is bound via Map.bind / Map.bind_to_environ, returning a
      MapAdapter (~line 418) whose match() resolves a request path to an
      endpoint.
    reference_files:
      - src/werkzeug/routing/map.py

  - id: Q-02
    tier: locate
    question: "Where are the built-in HTTP exception classes (e.g. NotFound, BadRequest) and the abort() helper defined?"
    reference_answer: >
      src/werkzeug/exceptions.py — HTTPException base (~line 68) with
      subclasses BadRequest (~192), Forbidden (~338), NotFound (~353),
      InternalServerError (~737); the default_exceptions status->class map
      (~837) and the Aborter / abort() helpers (~858-892).
    reference_files:
      - src/werkzeug/exceptions.py

  - id: Q-03
    tier: locate
    question: "Which module provides the test Client and EnvironBuilder used to drive WSGI apps in tests?"
    reference_answer: >
      src/werkzeug/test.py — EnvironBuilder (~line 177) assembles a WSGI
      environ, Client (~775) sends requests through an application and
      returns a TestResponse (~1288); run_wsgi_app (~1216) is the low-level
      driver that invokes the app callable.
    reference_files:
      - src/werkzeug/test.py

  - id: Q-04
    tier: path
    question: "How does a raw WSGI environ become a usable Request object?"
    reference_answer: >
      werkzeug.wrappers.request.Request (class ~line 32) subclasses the
      framework-agnostic sansio.request.Request (~line 34). Request.__init__
      pulls REQUEST_METHOD / PATH_INFO / QUERY_STRING / wsgi.url_scheme out
      of the environ and calls super().__init__(..., headers=
      EnvironHeaders(environ)); the sansio base stores method/path/headers
      while the wrappers subclass keeps self.environ and adds stream/body
      access.
    reference_files:
      - src/werkzeug/wrappers/request.py
      - src/werkzeug/sansio/request.py

  - id: Q-05
    tier: path
    question: "Trace how an incoming URL path is matched to a registered endpoint."
    reference_answer: >
      Map.bind / bind_to_environ (routing/map.py) returns a MapAdapter; its
      match() (~line 509) delegates to routing/matcher.py
      StateMachineMatcher.match (~75), which walks the compiled Rule objects
      (routing/rules.py). A miss raises NotFound / MethodNotAllowed (from
      werkzeug.exceptions) or RequestRedirect (from routing.exceptions).
    reference_files:
      - src/werkzeug/routing/map.py
      - src/werkzeug/routing/matcher.py
      - src/werkzeug/routing/rules.py

  - id: Q-06
    tier: path
    question: "How does submitted form data end up in request.form and request.files?"
    reference_answer: >
      Request.form / Request.files (wrappers/request.py ~450/~491) call
      _load_form_data() (~266), which builds a parser via
      make_form_data_parser() -> formparser.FormDataParser and runs
      parse_from_environ (~202) -> parse (~218). parse reads the Content-Type
      with http.parse_options_header and dispatches to the urlencoded or
      multipart (sansio/multipart.py) parser, yielding MultiDicts of fields
      and FileStorage files.
    reference_files:
      - src/werkzeug/wrappers/request.py
      - src/werkzeug/formparser.py
      - src/werkzeug/http.py

  - id: Q-07
    tier: path
    question: "How is a Response object turned into the WSGI (status, headers, body) output sent to the server?"
    reference_answer: >
      Used as a WSGI app, Response.__call__(environ, start_response)
      (wrappers/response.py ~line 566) calls get_wsgi_response (~547), which
      assembles the body iterator via get_app_iter (~520) and the header
      list via get_wsgi_headers (~438), then calls start_response(status,
      headers) and returns the app iterator. status/headers state lives on
      the sansio.response base.
    reference_files:
      - src/werkzeug/wrappers/response.py
      - src/werkzeug/sansio/response.py

  - id: Q-08
    tier: impact
    question: "What breaks if the parse_/dump_ header helpers in werkzeug.http change signature or behavior?"
    reference_answer: >
      werkzeug.http is a fan-in hub (validated god-node F-005; imported by
      ~21 modules): the datastructures (Accept/Auth/CacheControl/ETag/
      Headers/Range), sansio request/response, wrappers.response, formparser
      and several middleware bind its parse_options_header / parse_dict_header
      / dump_header / cookie / etag / date helpers directly, so a behavior
      change ripples through header handling across the whole stack.
    reference_files:
      - src/werkzeug/http.py
      - src/werkzeug/sansio/request.py
      - src/werkzeug/datastructures/headers.py

  - id: Q-09
    tier: impact
    question: "Which parts of the codebase are affected by modifying the datastructures package (MultiDict / Headers)?"
    reference_answer: >
      werkzeug.datastructures is the rank-1 bottleneck and god-node F-001
      (fan_in 66, degree 76, reaching 11 communities). Headers
      (headers.py:21) and the MultiDict family (structures.py:139) back
      request.headers / args / form and response.headers, so wrappers,
      sansio, http, formparser and the test client all depend on their APIs.
    reference_files:
      - src/werkzeug/datastructures/structures.py
      - src/werkzeug/datastructures/headers.py
      - src/werkzeug/wrappers/request.py

  - id: Q-10
    tier: impact
    question: "If the HTTP exception hierarchy in werkzeug.exceptions changed, what would be affected?"
    reference_answer: >
      werkzeug.exceptions is god-node F-004 (fan_in 13, spans 8 communities),
      imported by ~16 modules: routing (NotFound / MethodNotAllowed),
      formparser and sansio (RequestEntityTooLarge / BadRequest),
      wrappers.request/response, middleware, serving and utils all raise or
      catch HTTPException subclasses, and abort()/Aborter route status codes
      through default_exceptions.
    reference_files:
      - src/werkzeug/exceptions.py
      - src/werkzeug/routing/map.py
      - src/werkzeug/wrappers/request.py
